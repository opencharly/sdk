version: '3'

vars:
  # Pinned cue CLI — MUST match the embedded cuelang.org/go library (go.mod) so
  # the CLI that runs gengotypes is the same CUE version the library compiles
  # the schema with. Keep in lockstep with the superproject's taskfiles/Cue.yml
  # pin (the superproject asserts equality).
  CUE_VERSION: v0.16.1
  CUE_SHA256_amd64: 5d644c1305a2b86504c8dcd2ec829cf5b4999efc2cf51ee375624e0455f774ae
  # Pinned protoc + Go codegen plugins (see proto:gen). protoc-gen-go-grpc
  # v1.3.0 emits the SupportPackageIsVersion7 API compatible with grpc v1.61.0.
  PROTOC_VERSION: 28.3
  PROTOC_SHA256_amd64: 0ad949f04a6a174da83cdcbdb36dee0a4925272a5b6d83f79a6bf9852076d53f
  PROTOC_GEN_GO_VERSION: v1.36.11
  PROTOC_GEN_GO_GRPC_VERSION: v1.3.0

tasks:
  # ---------------------------------------------------------------------------
  # cue:gen — regenerate every CUE-owned SDK artifact.
  #
  #   spec/cue_types_gen.go  (cue exp gengotypes — the Go param structs)
  #   spec/vocab_gen.go      (internal/schemagen — the vocab lists)
  #   spec/version_gen.go    (internal/schemagen — SchemaVersion/SchemaFloor)
  #
  # Self-bootstraps the pinned cue CLI into ./bin/cue (gitignored). The schema
  # concatenation is produced by internal/schemagen (-mode=concat), which
  # mirrors charly core's runtime sharedCueSchema concatenation via the shared
  # schemaconcat package (R3 — one concatenation contract). Reproducible: two
  # consecutive runs produce no diff (guarded by TestGenReproducible in spec).
  # ---------------------------------------------------------------------------
  cue:gen:
    desc: Regenerate all CUE-owned SDK artifacts, including the protobuf wire contract
    dir: "{{.ROOT_DIR}}"
    cmds:
      - task: wire:gen
      - task: bootstrap-cue
      - |
        set -euo pipefail
        CUE="$PWD/bin/cue"
        GENDIR="$(mktemp -d)"
        trap 'rm -rf "$GENDIR"' EXIT
        mkdir -p "$GENDIR/cue.mod"
        cat > "$GENDIR/cue.mod/module.cue" <<EOM
        module: "github.com/opencharly/sdk/schema/spec-codegen"
        language: version: "{{.CUE_VERSION}}"
        EOM
        # 1) Concatenate schema/*.cue the SAME way the runtime sharedCueSchema does,
        #    headed `package spec` + `@go(spec)` (R3: one concatenation, in schemagen).
        go run ./internal/schemagen -mode=concat -schema=schema -out="$GENDIR/schema_spec.cue"
        # 2) cue exp gengotypes → the Go param structs.
        ( cd "$GENDIR" && "$CUE" exp gengotypes ./schema_spec.cue )
        GEN="$(ls "$GENDIR"/cue_types*_gen.go 2>/dev/null | head -1)"
        test -n "$GEN" || { echo "cue:gen: gengotypes produced no cue_types*_gen.go" >&2; exit 1; }
        cp "$GEN" spec/cue_types_gen.go
        # 2b) Double the generated json struct tags with yaml tags (principled Go
        #     transform inside schemagen -mode=retag — never sed on generated Go).
        go run ./internal/schemagen -mode=retag -out=spec/cue_types_gen.go
        # 3) Companion generator → the vocab lists.
        go run ./internal/schemagen -mode=vocab -schema=schema -out=spec/vocab_gen.go
        # 3b) Companion generator → the HEAD schema-version consts, read from the
        #     CUE-owned schema/version.cue #SchemaVersion/#SchemaFloor.
        go run ./internal/schemagen -mode=version -schema=schema -out=spec/version_gen.go
        # 4) gofmt the committed generated files.
        gofmt -w spec/cue_types_gen.go spec/vocab_gen.go spec/version_gen.go
        echo "cue:gen: regenerated spec/{cue_types_gen.go,vocab_gen.go,version_gen.go}"

  bootstrap-cue:
    desc: Ensure ./bin/cue is the pinned cue CLI (prefers the RDD scratch binary, else checksum-verified download)
    dir: "{{.ROOT_DIR}}"
    status:
      - test -x bin/cue && bin/cue version 2>/dev/null | grep -q '{{.CUE_VERSION}}'
    cmds:
      - |
        set -euo pipefail
        mkdir -p bin
        if [ -x /tmp/cue-rdd/cue ] && /tmp/cue-rdd/cue version 2>/dev/null | grep -q '{{.CUE_VERSION}}'; then
          cp /tmp/cue-rdd/cue bin/cue
        else
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64) GOARCH=amd64; SHA='{{.CUE_SHA256_amd64}}' ;;
            *) echo "bootstrap-cue: unsupported arch $ARCH (only linux/amd64 is checksum-pinned)" >&2; exit 1 ;;
          esac
          TARBALL="cue_{{.CUE_VERSION}}_linux_${GOARCH}.tar.gz"
          URL="https://github.com/cue-lang/cue/releases/download/{{.CUE_VERSION}}/${TARBALL}"
          TMP="$(mktemp -d)"
          trap 'rm -rf "$TMP"' EXIT
          echo "bootstrap-cue: downloading $URL"
          curl -fsSL -o "$TMP/$TARBALL" "$URL"
          echo "${SHA}  $TMP/$TARBALL" | sha256sum -c - || { echo "bootstrap-cue: checksum mismatch — refusing to extract" >&2; exit 1; }
          tar -xzf "$TMP/$TARBALL" -C "$TMP" cue
          mv "$TMP/cue" bin/cue
        fi
        chmod +x bin/cue
        bin/cue version | grep -q '{{.CUE_VERSION}}' || { echo "bootstrap-cue: bin/cue is not {{.CUE_VERSION}}" >&2; exit 1; }
        echo "bootstrap-cue: bin/cue is $(bin/cue version | head -1)"

  # ---------------------------------------------------------------------------
  # wire:gen — regenerate the protobuf IDL and Go stubs from protocol/schema.
  #
  #   proto/plugin.pb.go       (messages)
  #   proto/plugin_grpc.pb.go  (services)
  #
  # proto/plugin.proto is generated output, never an authoring surface.
  # Self-bootstraps a checksum-pinned protoc + the two pinned Go codegen plugins
  # into ./bin (gitignored). Reproducible — verify with:
  #   rm -f bin/protoc bin/protoc-gen-go bin/protoc-gen-go-grpc
  #   task proto:gen && git diff --exit-code proto
  # ---------------------------------------------------------------------------
  wire:gen:
    desc: Regenerate proto/plugin.proto and Go stubs from protocol/schema/*.cue
    dir: "{{.ROOT_DIR}}"
    cmds:
      - task: bootstrap-protoc
      - |
        set -euo pipefail
        export PATH="$PWD/bin:$PATH"
        go run ./internal/wiregen -schema=protocol/schema -out=proto/plugin.proto
        bin/protoc \
          --go_out=. --go_opt=module=github.com/opencharly/sdk \
          --go-grpc_out=. --go-grpc_opt=module=github.com/opencharly/sdk \
          --proto_path=proto proto/plugin.proto
        gofmt -w proto/plugin.pb.go proto/plugin_grpc.pb.go
        echo "wire:gen: regenerated proto/plugin.proto and Go stubs from CUE"

  # Compatibility alias for existing callers. The protobuf source is CUE.
  proto:gen:
    desc: Alias for wire:gen
    cmds:
      - task: wire:gen

  bootstrap-protoc:
    desc: Ensure ./bin has the pinned protoc + protoc-gen-go + protoc-gen-go-grpc
    dir: "{{.ROOT_DIR}}"
    status:
      - test -x bin/protoc && bin/protoc --version 2>/dev/null | grep -q '{{.PROTOC_VERSION}}'
      - test -x bin/protoc-gen-go
      - test -x bin/protoc-gen-go-grpc && bin/protoc-gen-go-grpc --version 2>/dev/null | grep -q '{{.PROTOC_GEN_GO_GRPC_VERSION | trimPrefix "v"}}'
    cmds:
      - |
        set -euo pipefail
        mkdir -p bin
        ZIP="protoc-{{.PROTOC_VERSION}}-linux-x86_64.zip"
        URL="https://github.com/protocolbuffers/protobuf/releases/download/v{{.PROTOC_VERSION}}/$ZIP"
        TMP="$(mktemp -d)"; trap 'rm -rf "$TMP"' EXIT
        curl -fsSL "$URL" -o "$TMP/$ZIP"
        echo "{{.PROTOC_SHA256_amd64}}  $TMP/$ZIP" | sha256sum -c - \
          || { echo "proto:bootstrap: protoc checksum mismatch — refusing tampered/wrong artifact" >&2; exit 1; }
        python3 -c "import zipfile,sys; zipfile.ZipFile(sys.argv[1]).extractall(sys.argv[2])" "$TMP/$ZIP" "$TMP/x"
        cp "$TMP/x/bin/protoc" bin/protoc && chmod +x bin/protoc
        GOBIN="$PWD/bin" go install google.golang.org/protobuf/cmd/protoc-gen-go@{{.PROTOC_GEN_GO_VERSION}}
        GOBIN="$PWD/bin" go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@{{.PROTOC_GEN_GO_GRPC_VERSION}}
