// Code generated by sdk/internal/wiregen from protocol/schema/*.cue. DO NOT EDIT.
// CUE is the authoritative source for this transport contract.

// The Charly plugin gRPC contract. One Provider service mirrors the unified
// provider interface; typed protobuf messages carry transport, streaming,
// and handshake control while CUE-generated JSON payloads carry domain data.
syntax = "proto3";
package charlyplugin;
option go_package = "github.com/opencharly/sdk/proto";

message Empty {
}

message Capabilities {
  // the plugin's CalVer (CalVer is the version authority)
  string calver = 1;
  // thin secondary gate; never duplicates CalVer
  uint32 protocol_version = 2;
  // the unit's capabilities + the def validating each input
  repeated ProvidedCapability provided = 3;
  // the unit's package-less, SELF-CONTAINED .cue source text
  string schema_cue = 4;
}

// ProvidedCapability — one served capability plus the CUE def that validates its
// plugin_input. The schema travels with the plugin over Describe (the same channel
// for in-proc builtin and out-of-proc external — zero distinction), so the host
// validates authored plugin_input against `base ++ served` without ever reading a
// candy's schema/ dir. `input_def` is explicit (no Title-case naming convention).
message ProvidedCapability {
  // "verb" / "kind" / "deploy" / "step" / "builder"
  string class = 1;
  // the reserved word, e.g. "externalprobe"
  string word = 2;
  // the CUE def for this word's plugin_input, e.g. "#ExternalprobeInput"
  string input_def = 3;
  // set ONLY for class="step" (F3): the plugin-declared install-step contract
  StepContract step_contract = 4;
  // set ONLY for class="kind" (F5): the kind decodes a STRUCTURAL entity (a spec.Deploy member tree -> uf.Bundle) rather than a FLAT body (-> uf.PluginKinds)
  bool structural = 5;
  // set ONLY for class="deploy" (F6): the substrate brings its OWN host-side venue lifecycle (PrepareVenue/Start/Stop/...) served over the lifecycle Ops; the host registers a wire-backed substrateLifecycle for it
  bool lifecycle = 6;
  // set ONLY for class="deploy" (F6): the substrate declares a host-side PRERESOLVE step (OpPreresolve) the host runs before apply, shipping the opaque result in DeployVenue.Substrate
  bool preresolve = 7;
  // set ONLY for class="kind" (F7/C8): the kind serves a deep OpValidate check (returns Diagnostics) BEYOND the static CUE input-def gate; the host dispatches OpValidate at load
  bool validates = 8;
  // F9: the plugin lifecycle PHASE (sdk.Phase*; "" => runtime default) — the ordered point at which the kernel loads/invokes the plugin; "bootstrap" runs BEFORE config validation/migration
  string phase = 9;
  // set ONLY for class="verb": the input field the scalar sugar shorthand targets (`file: /x` -> plugin_input: {<primary>: "/x"}); "" => map input only
  string primary = 10;
  // set ONLY for class="kind" (P9): a SUBSTRATE kind's DECLARED deploy behaviour traits, the SINGLE plugin-declared source kit.StampDescent stamps onto node.Descent — the consult sites read the traits off node.Descent instead of switching on the substrate kind word
  DeployTraits deploy_traits = 11;
  // set ONLY for class="command": the plugin's DECLARED one-level-deep CLI subcommand catalog (name+help). Lets the host build a REAL nested Kong grammar (in place of the opaque `[<args>...]` pass-through holder every command-class capability otherwise gets) and synthesize a dotted "<word>.<name>" CLI-model leaf per entry for `charly __cli-model` / MCP tool generation. Empty (the default) preserves today's flat pass-through behavior byte-for-byte.
  repeated CLISubcommand subcommands = 12;
  // CUE #CLIModel JSON for class=command; lets CLI and MCP reflect plugin-owned leaves without importing plugin code
  bytes command_model_json = 13;
}

// CLISubcommand — one DECLARED child of a class="command" capability's own CLI word (F-CLI-NEST).
// A plain name+help pair, not a full grammar: the host renders it as a Kong `cmd:""` child whose
// OWN body is still a pass-through Args leaf (the plugin's real internal flag/positional shape
// stays invisible to the host, exactly like today's flat holder — only the NAMING becomes real).
message CLISubcommand {
  // the subcommand word, e.g. "live", "boxes"
  string name = 1;
  // one-line help text, shown in `--help` and used as the MCP tool description
  string help = 2;
}

// DeployTraits — a SUBSTRATE kind's DECLARED deploy behaviour (P9), advertised per substrate
// word over Describe and stamped by kit.StampDescent onto the node's DescentDescriptor. This is
// the SINGLE plugin-declared source for "how does this substrate behave in the deploy chain",
// so the kernel consults it BY TRAIT (off node.Descent) — never by switching on the kind word.
// Canonical table: pod=container+image_backed+image_context; vm=ssh+machine_venue+exclusive_venue;
// local=shell+machine_venue; k8s=shell+image_context+leaf_only; android=parent; zero value =
// external-in-place. Empty/absent for every non-kind (or non-substrate kind) capability.
message DeployTraits {
  // "container" | "ssh" | "shell" | "parent" | "none": how commands physically execute in this substrate's venue
  string venue = 1;
  // the substrate runs a baked OCI image (pod)
  bool image_backed = 2;
  // the substrate composes over an image build context (pod overlay, k8s manifests)
  bool image_context = 3;
  // the substrate is a full machine with a system init (host/vm/local) — services render as systemd units, not a container init
  bool machine_venue = 4;
  // the substrate holds an exclusive host-resource lease boundary (vm)
  bool exclusive_venue = 5;
  // the substrate is a deploy-chain LEAF — it cannot be descended into (k8s)
  bool leaf_only = 6;
}

// StepContract — a class="step" plugin's DECLARED install-step contract (F3): where the
// step's effect lands (scope) + where its commands execute (venue) + the opt-in gate it
// needs. This is what makes an external step kind a first-class IR step whose privilege /
// gating the host applies WITHOUT a compiled-in case (the open default arm). Reverse is NOT
// declared — an external step's teardown ops are DYNAMIC, recorded from its OpExecute reply
// (the same record-and-replay as ExternalPluginStep). Empty/absent for non-step capabilities.
message StepContract {
  // "system" | "user" | "user-profile"
  string scope = 1;
  // Venue enum: 0=host-native, 1=container-builder, 2=skip
  int32 venue = 2;
  // "" | "allow-repo-changes" | "allow-root-tasks" | "with-services"
  string gate = 3;
  // F-STEP-EMIT: the step produces a build-context Containerfile FRAGMENT (Invoke(OpEmit)); the pod-overlay OCITarget bakes it. false => deploy-only step (no build fragment; OCITarget skips it, like apk on an image build)
  bool emits = 4;
}

message InvokeRequest {
  // the reserved word, e.g. "exampleprobe","cdp","local"
  string reserved = 1;
  // operation selector for the word's class
  string op = 2;
  // the CUE-generated params (Op for verbs/steps; entity for kinds)
  bytes params_json = 3;
  // snapshotCheckEnv / venue descriptor (serializable invocation ctx)
  bytes env_json = 4;
  // the ProviderClass ("verb"/"kind"/...) — words aren't unique across classes
  string class = 5;
  // E3b: the go-plugin broker id the host serves ExecutorService on for a deploy/step/builder op; 0 = none (verb/kind ops need no executor)
  uint32 executor_broker_id = 6;
}

// CheckResult / InstallPlan / Diagnostics, JSON
message InvokeReply {
  bytes result_json = 1;
}

// one streamed result frame (single-shot sends one)
message Frame {
  bytes result_json = 1;
}

// ChannelFrame is the generic, bidirectional provider process channel. Domain payloads remain CUE-generated JSON; this envelope owns ordering, flow control, terminal data, and lifecycle signals without naming a runtime or transport.
message ChannelFrame {
  // stable idempotency/correlation key for the channel
  string request_id = 1;
  // monotonic sender sequence; zero is reserved for an unsequenced open
  uint64 sequence = 2;
  // highest contiguous peer sequence consumed
  uint64 ack_sequence = 3;
  // open|stdin|stdout|stderr|terminal|status|resize|signal|ack|cancel|exit|error|resync
  string kind = 4;
  // provider class, set on open
  string class = 5;
  // provider word, set on open
  string reserved = 6;
  // provider operation, set on open
  string op = 7;
  // CUE-generated domain payload or structured status
  bytes payload_json = 8;
  // binary-safe process or terminal bytes; never shell-interpreted
  bytes data = 9;
  // canonical key, signal, stream, or status name
  string name = 10;
  uint32 cols = 11;
  uint32 rows = 12;
  int32 exit_code = 13;
  string error = 14;
  // CUE-generated generic target chain, set on open
  bytes target_json = 15;
  // first sequence requested during attach/resynchronization
  uint64 replay_from = 16;
}

// InvokeProviderRequest mirrors InvokeRequest minus the broker id (the host already holds the
// reverse context): dispatch op `op` on provider (class, reserved) with params/env (F10).
message InvokeProviderRequest {
  string class = 1;
  string reserved = 2;
  string op = 3;
  bytes params_json = 4;
  bytes env_json = 5;
  // OPTIONAL marshalled spec.VenueDescriptor (S1 — the venue-scoped-executor-session
  // seam). The calling plugin supplies its OWN self-described venue (shell or ssh) when
  // it wants the target provider Invoked WITH a live executor but holds no enclosing
  // executor of its own to forward (e.g. a verb/kind Invoke with no deploy-context
  // broker). On presence, the host re-materializes a FRESH DeployExecutor from the
  // descriptor (venueFromDescriptor) and threads THAT onto the nested InvokeWithExecutor
  // call instead of the caller's own executor. Empty/absent — byte-identical prior
  // behavior (the caller's own executor, if any, is forwarded as before).
  bytes venue_descriptor_json = 6;
  // OPTIONAL canonical candy ref (S3b — the Pass-2 lazy-connect gap). The host's
  // InvokeProvider handler falls back to connectPluginByWordRef(class, word, extraRef)
  // on a registry miss (S2); passing "" only ever reaches Pass-1 (the calling project's
  // own candy closure) — a target declared nowhere in that closure but resolvable via an
  // explicit @github canonical ref (the same Pass-2 fetch the credential/vm/kube host
  // adapters already use) needs this field set. Empty/absent — byte-identical S2
  // behavior (Pass-1 only).
  string extra_ref = 7;
}

// HostBuildRequest names a registered host-builder `kind` (e.g. "plugin-binary", and — added by
// M13/M14 — "kustomize"/"image") + an opaque `spec_json` it interprets (F10). HostBuildReply
// carries the builder's opaque result (e.g. an artifact path/handle JSON) or an error.
message HostBuildRequest {
  string kind = 1;
  bytes spec_json = 2;
}

message HostBuildReply {
  bytes result_json = 1;
  string error = 2;
}

// C9 resource-arbiter reverse channel (ExecutorService.HostArbiter). action names one of the
// 7 arbiter host-seams (spec.ArbiterSeam*); params_json is the seam's spec request; result_json
// is the seam's spec reply. error = an infra failure of the RPC handler itself (a seam OP failure
// rides the reply's own error field, like RunReply/HostBuildReply).
message HostArbiterRequest {
  string action = 1;
  bytes params_json = 2;
}

message HostArbiterReply {
  bytes result_json = 1;
  string error = 2;
}

message VenueReply {
  string venue = 1;
}

// opts_json = EmitOpts, JSON
message RunRequest {
  string script = 1;
  bytes opts_json = 2;
}

// empty error = success
message RunReply {
  string error = 1;
}

// content placed at path; mode = octal perms; opts_json = EmitOpts
message PutFileRequest {
  string path = 1;
  bytes content = 2;
  uint32 mode = 3;
  bool owner_root = 4;
  bytes opts_json = 5;
}

// empty error = success
message PutFileReply {
  string error = 1;
}

// error = execution failure, NOT a non-zero exit
message CaptureReply {
  string stdout = 1;
  string stderr = 2;
  int32 exit_code = 3;
  string error = 4;
}

// F12 RunInteractive/RunStream: stdout/stderr/stdin went LIVE to the operator's terminal (host-held), so no buffers — only the session's exit code; error = execution/spawn failure, NOT a non-zero exit (CaptureReply's split, sans buffers)
message LiveReply {
  int32 exit_code = 1;
  string error = 2;
}

message GetFileRequest {
  string path = 1;
  bool as_root = 2;
  bytes opts_json = 3;
}

message GetFileReply {
  bytes content = 1;
  string error = 2;
}

// step_json = ONE spec.InstallStepView (a HOST-ENGINE step kind — Builder, LocalPkgInstall,
// SystemPackages, an act-verb Op, or ExternalPlugin — projected by stepToView); opts_json =
// EmitOpts. reverse_ops_json = the step's recorded []spec.ReverseOp (the plugin folds them
// into its DeployReply for record-and-replay teardown). error = a host-engine/apply FAILURE
// on the venue (the RPC itself succeeds — the failure rides the reply field, like
// RunReply/CaptureReply).
message HostStepRequest {
  bytes step_json = 1;
  bytes opts_json = 2;
}

message HostStepReply {
  bytes reverse_ops_json = 1;
  string error = 2;
}

// HTTPDoRequest carries the FULL request + per-request policy the host needs to build the
// client (httpClientFor) host-side: ca_pem is the resolved CA PEM bytes (the candy reads its
// authored ca_file host-side and ships the bytes), timeout is a Go duration string ("" = base).
message HTTPDoRequest {
  string method = 1;
  string url = 2;
  bytes body = 3;
  map<string, string> headers = 4;
  string timeout = 5;
  bool allow_insecure = 6;
  bool no_follow_redirects = 7;
  bytes ca_pem = 8;
}

// HTTPDoReply: status + body + response headers, or a transport-level error (the RPC itself
// succeeds — a failed request rides the error field, like RunReply/CaptureReply).
message HTTPDoReply {
  int32 status = 1;
  bytes body = 2;
  // pre-formatted "Key: value\n" blob (multi-value preserved), matcher-ready
  string header_blob = 3;
  string error = 4;
}

message AddBackgroundRequest {
  int32 pid = 1;
}

// ResolveEndpointRequest: the in-venue TCP port to resolve to a host-reachable address.
message ResolveEndpointRequest {
  int32 port = 1;
}

// ResolveEndpointReply: the host-reachable "host:port" addr, or a resolution error.
message ResolveEndpointReply {
  string addr = 1;
  string error = 2;
}

// ResolveGraphicsEndpointRequest: the graphics kind to resolve ("vnc" | "spice").
message ResolveGraphicsEndpointRequest {
  string kind = 1;
}

// ResolveGraphicsEndpointReply: the dialable endpoint. Exactly one of addr / socket is set;
// password is the resolved ticket (empty = no auth). skip=true with skip_message signals a
// deployment with no graphics device of that kind (an N/A skip, not a failure).
message ResolveGraphicsEndpointReply {
  string addr = 1;
  string socket = 2;
  string password = 3;
  bool skip = 4;
  string skip_message = 5;
  string error = 6;
}

// ResolveClusterContextRequest: the charly k8s cluster-profile name to map to a context.
message ResolveClusterContextRequest {
  string cluster = 1;
}

// ResolveClusterContextReply: the resolved kubeconfig context ("" = no matching profile).
message ResolveClusterContextReply {
  string context = 1;
  string error = 2;
}

// ResolveImageLabelRequest: the OCI label name to read (e.g. "ai.opencharly.mcp_provide").
message ResolveImageLabelRequest {
  string label = 1;
}

// ResolveImageLabelReply: the raw label value ("" = label absent on the image).
message ResolveImageLabelReply {
  string value = 1;
  string error = 2;
}

// PluginMeta — read once on connect.
service PluginMeta {
  rpc Describe(Empty) returns (Capabilities);
}

// Provider — the ONE uniform capability service. `reserved` is the reserved word
// (the registry key); `op` selects the operation for that word's class
// (load/validate/run/emit/render/resolve); params_json + env_json carry the
// CUE-typed params + the serializable invocation context (snapshotCheckEnv).
service Provider {
  // single-shot (the common path)
  rpc Invoke(InvokeRequest) returns (InvokeReply);
  // streaming (record/logcat/execute)
  rpc InvokeStream(InvokeRequest) returns (stream Frame);
  // generic bidirectional provider/process stream with explicit ordering, acknowledgements, cancellation, and resynchronization
  rpc Channel(stream ChannelFrame) returns (stream ChannelFrame);
}

// ExecutorService — the HOST-SERVED reverse channel (E3b). A provider's live
// DeployExecutor (shell/SSH on the venue) cannot cross the process boundary, so an
// OUT-OF-PROCESS provider drives it by calling BACK to the host: the host serves this
// service on the go-plugin GRPCBroker, passes its broker id in
// InvokeRequest.executor_broker_id, and the plugin dials that id to run ops against the
// real venue. Built-in providers use the typed DeployExecutor directly (no wire).
// RunSystem/RunUser/Venue are the deploy/step/builder legs (fire-a-script, error-only);
// PutFile is the deploy/step file-PLACEMENT leg — an out-of-process deploy/step plugin
// that EXECUTES an InstallPlan's steps pushes file content (units, env.d, the charly
// binary, builder artifacts) onto the venue, the kit.Executor.PutFile surface made
// wire-backed (the host materializes the carried bytes to a temp file, then delegates
// to the live DeployExecutor.PutFile). RunCapture/GetFile are the CHECK-VERB legs — an
// out-of-process exec-based check verb (record — and dbus/wl when they externalize)
// probes the live container by capturing stdout/stderr/exit or pulling a venue file (a
// screenshot/recording artifact), the kit.Executor.RunCapture/GetFile surface made
// wire-backed.
//
// RunHostStep is the HOST-ENGINE channel (the generalization of the former F3 build channel): the
// irreducible host machinery — the build ENGINE (Generator / OCITarget / ResolveBox /
// podman / BuilderRun / EnsureImagePresent / makepkg), the DistroConfig package-template
// render, the in-proc provider registry (ProvisionActor act verbs), and the broker that
// dispatches ANOTHER plugin — STAYS in charly's core (package main — it cannot move into
// the leaf plugin/kit package without dragging package main in). So an OUT-OF-PROCESS
// deploy/step plugin walking an InstallPlan that hits one of the HOST-ENGINE step kinds —
// BuilderStep (pixi/npm/cargo/aur), LocalPkgInstallStep (makepkg + pacman/dnf/apt),
// SystemPackagesStep (the format's host install template, rendered from the project
// DistroConfig), an act-verb OpStep (a `run: plugin: <verb>` whose builtin ProvisionActor
// shell needs the in-proc registry), or an ExternalPluginStep (a `run: plugin: <verb>`
// served by ANOTHER out-of-process plugin, dispatched over a NESTED reverse channel) —
// dials BACK to RunHostStep. The host reconstructs the step from its serializable view,
// runs the EXISTING in-core machinery on the host, applies the effect onto the venue via
// the EXISTING executor (the plugin's own venue, which the host already holds for this
// Invoke), and returns the step's recorded ReverseOps so the plugin folds them into its
// DeployReply (record-and-replay teardown). Every OTHER (plugin-renderable) step kind the
// plugin EXECUTES itself via the RunSystem/RunUser/PutFile legs — reaching RunHostStep
// with one of those is a plugin-walk bug. The plugin owns the plan WALK ordering; the host
// owns the host ENGINE.
service ExecutorService {
  rpc Venue(Empty) returns (VenueReply);
  rpc RunSystem(RunRequest) returns (RunReply);
  rpc RunUser(RunRequest) returns (RunReply);
  // place file content on the venue (binary-safe; owner_root → root:root via sudo)
  rpc PutFile(PutFileRequest) returns (PutFileReply);
  // capture stdout/stderr/exit (no root escalation — callers add sudo)
  rpc RunCapture(RunRequest) returns (CaptureReply);
  // F12: run script on the venue wired to the operator's LIVE TTY (the host reverse-server runs IN the charly process, so it inherits os.Stdin/os.Stdout/os.Stderr = the operator's terminal — stdio NEVER crosses the wire, only script→exit; the child podman exec -it / ssh -t owns the PTY + resize + Ctrl-C). Blocks until the session ends; UNARY (host holds the TTY — the hostBuildCli doctrine). Consumers: charly shell (-it), charly cmd (-i)
  rpc RunInteractive(RunRequest) returns (LiveReply);
  // F12: run script on the venue streaming stdout/stderr LIVE to the operator (inherited os.Stdout/os.Stderr; no stdin). Blocks until exit. UNARY (host holds the terminal). Consumer: charly logs --follow
  rpc RunStream(RunRequest) returns (LiveReply);
  // read a venue file (e.g. a record/screenshot artifact pulled back to the host)
  rpc GetFile(GetFileRequest) returns (GetFileReply);
  // run a HOST-ENGINE step (Builder/LocalPkgInstall/SystemPackages/act-OpStep/ExternalPlugin) on the host engine + apply onto the venue
  rpc RunHostStep(HostStepRequest) returns (HostStepReply);
  // F10 plugin↔plugin: the host resolves another provider by (class,word) + Invokes it on the calling plugin's behalf (threading the SAME venue executor) — the generalization of the RunHostStep ExternalPlugin arm to ANY class/op
  rpc InvokeProvider(InvokeProviderRequest) returns (InvokeReply);
  // F10 host-build: the calling plugin requests a HOST-side build (the build engine stays in core) — the host runs the registered host-builder for `kind` and returns its result
  rpc HostBuild(HostBuildRequest) returns (HostBuildReply);
  // C9 resource-arbiter seams: the COMPILED-IN candy/plugin-preempt (verb:arbiter) calls back mid-logic for its host dependencies (config gather/resources, VM/pod lifecycle running/stop/start, the GPU driver flip switchMode/ensureCDI). action-multiplexed (the GpuProbeInput pattern) — the host runs the seam's in-core default impl and replies
  rpc HostArbiter(HostArbiterRequest) returns (HostArbiterReply);
}

// CheckContextService is the host-served reverse channel (F2) for the HOST-COUPLED
// check-verb kit (kit): the legs kit.CheckContext exposes that cannot ride
// the env_json snapshot because they hold a live host resource. It is served on the SAME
// go-plugin broker as ExecutorService (the broker id in InvokeRequest.executor_broker_id),
// so a kit verb served OUT-OF-PROCESS reaches BOTH the venue (Exec, via ExecutorService)
// AND these host-vantage legs. Two RPCs, both class-generic (any kit verb may use either —
// never a per-verb RPC, the Uniform API Invariant):
// - HTTPDo: the host issues an HTTP request from the CHARLY HOST's network namespace with
// the per-request TLS/redirect/CA policy applied (the http verb's cc.HTTPClient() leg —
// an *http.Client cannot cross the wire, so the REQUEST crosses and the host dials).
// - AddBackground: register a host-side background PID with the active plan run for teardown
// reap (the command verb's fire-and-forget leg).
// Mode/Box/Instance/Distros/DialTimeout are plain scalars and ride the env_json CheckEnv
// snapshot, NOT this service.
service CheckContextService {
  rpc HTTPDo(HTTPDoRequest) returns (HTTPDoReply);
  rpc AddBackground(AddBackgroundRequest) returns (Empty);
  // ResolveEndpoint: resolve the check target's venue (container / VM / ssh / local) and
  // return a host-reachable address for an in-venue TCP port — opening (and host-side
  // tracking, for post-Invoke teardown) any ssh -L forward a VM/ssh venue needs. Class-
  // generic: ANY endpoint check verb (cdp/vnc/spice/…) declares its port and dials the addr.
  rpc ResolveEndpoint(ResolveEndpointRequest) returns (ResolveEndpointReply);
  // ResolveGraphicsEndpoint: resolve a VM's <graphics type='<kind>'> listener (kind = "vnc"
  // | "spice") to a dialable endpoint — the host owns the go-libvirt resolution, any
  // qemu+ssh:// tunnel (tracked for post-Invoke teardown), the socket->TCP bridge a TCP-only
  // client needs, and the credential-store password. Class-generic: parameterized by kind,
  // shared by the vnc + spice verbs (never a per-verb RPC).
  rpc ResolveGraphicsEndpoint(ResolveGraphicsEndpointRequest) returns (ResolveGraphicsEndpointReply);
  // ResolveClusterContext: map a charly k8s cluster-profile NAME to its kubeconfig context by
  // reading the project's kind:k8s spec (findK8sSpec) — the host owns the project loader the
  // out-of-process plugin cannot reach. Class-generic (concept-named, not verb-named): any
  // cluster-probing verb declares its cluster profile and gets the context. Empty context (no
  // matching profile) is a valid reply — the plugin falls back to the kubeconfig current-context.
  rpc ResolveClusterContext(ResolveClusterContextRequest) returns (ResolveClusterContextReply);
  // ResolveImageLabel: read one OCI label value off the deployment-under-test's image — the
  // host owns the podman engine + container→image resolution the out-of-process plugin cannot
  // reach. Class-generic (parameterized by label name): the mcp verb reads ai.opencharly.mcp_provide;
  // any verb needing a baked label uses it. Empty value (label absent) is a valid reply.
  rpc ResolveImageLabel(ResolveImageLabelRequest) returns (ResolveImageLabelReply);
}
